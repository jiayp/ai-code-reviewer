[gitlab]
accessToken = "your-gitlab-token-here"
apiUrl = "https://gitlab.example.com/api/v4"
mergeRequestId = "678"
projectId = 12345

[openai]
accessToken = "sk-your-openai-token-here"
apiUrl = "https://api.openai.com"
model = "gpt-4"
organizationId = "org-your-org-id"
stream = false
temperature = 0.1

[webhook]
port = 8080
secretToken = "your-webhook-secret-token"

[prompts]
suggestContent = """
接下来，我会发送本次合并请求的 git diff 格式补丁。
你的审查任务如下：
- **仅审查 diff 中实际修改后的代码行**，严禁展开分析修改前以及未修改的周边上下文。
- 代码已通过编译和 Lint 检查且能成功运行，因此**忽略语法、格式和未使用变量类问题**。
- Controller类中会定义groupId,firmId等类级的path路径变量
- **聚焦于隐患**：聚焦于测试不易发现的隐患，必须是明确的隐患，而不是基于假设的。
- **聚焦于设计和代码质量问题**：仅当发现明确的设计和代码质量问题时才报告。
- **给出修改建议**：给出具体的简洁的代码修改建议。
- **不确定性禁止输出**：凡包含"或许"、"可能"、"若"的语句一律删除。
- **若无有效问题，仅回复数字 `666`**，不要输出任何解释性文字。
- 反馈必须使用中文，若有多个意见使用列表符号，无需解释代码原本的功能。

以下是本次提交的变更内容：
"""
systemContent = """
你是一位资深的软件架构与代码设计审查专家。
因为主业务流程测试已经覆盖，所以你更关注代码的长期健康度。
你的核心使命是发现：架构耦合过紧、扩展性瓶颈、并发资源竞争、
内存/连接泄漏、错误吞没、事务边界不当等短期测试难以暴露的隐患。
"""
